name: CI

# Runs ruff + mypy + unit tests on every PR that touches code or config.
# Eval tests (DeepEval / Ragas) are excluded by default — they hit paid LLM
# APIs and run locally or via a separate workflow_dispatch when needed.
#
# Path filters mean this workflow stays quiet during the docs-only bootstrap
# phase. First real run is Issue 1's PR (which lands pyproject.toml + Makefile).

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "feast_repo/**"
      - "pyproject.toml"
      - "uv.lock"
      - "ruff.toml"
      - "Makefile"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      # Pre-download two lazy-loaded NLP models so hermetic unit tests
      # don't trigger network access on first use:
      #   - spaCy `en_core_web_sm` — needed by `unstructured.
      #     partition_html`'s element classifier. Hosted only on
      #     GitHub (no PyPI wheel), so `uv sync` does not install it.
      #   - BGE `BAAI/bge-small-en-v1.5` — in-process embedding fallback
      #     used by `EmbeddingAdapter` when `VOYAGE_API_KEY` is absent.
      #     `sentence-transformers` lazy-loads from HuggingFace on first
      #     instantiation; pre-warming lets the conftest's session-
      #     autouse fixture serve hermetic tests without network.
      # `_ensure_nlp_warmup` and `_ensure_bge_warmup` raise with a clear
      # remediation pointing back here when their caches are missing.
      - name: Install NLP models
        run: make setup-nlp

      # Pre-pull the Qwen3-Reranker 0.6B weights into the HF cache so
      # the unit-conftest `_warm_qwen3_reranker` autouse fixture is
      # served offline. Without this step the fixture would either
      # download ~1.2 GB at session start every CI run or fail outright
      # if HF Hub is rate-limited / unreachable.
      - name: Install reranker weights
        run: make setup-reranker

      - name: Lint + typecheck
        run: make quick

      - name: Unit tests
        run: make test
