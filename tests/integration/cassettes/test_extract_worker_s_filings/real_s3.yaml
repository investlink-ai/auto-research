      we intend to use the net proceeds from the sale of the securities for general
      corporate purposes, including working capital, research and development activities,
      capital expenditures, and to fund the Phase II clinical trial of our lead therapeutic
      candidate ACM-101 in patients with relapsed multiple myeloma. PLAN OF DISTRIBUTION
