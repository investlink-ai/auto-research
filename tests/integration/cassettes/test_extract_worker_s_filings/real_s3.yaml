      S-3 \u2014 Shelf Registration Statement\\n\\nIssuer: Acme Therapeutics, Inc.
      (CIK 0001234567)\\nAccession Number: 0001234567-25-000042\\nFiled: 2026-03-15\\n\\nPROSPECTUS
      SUMMARY\\n\\nWe may offer and sell from time to time, in one or more offerings,
      up to\\n$300 million in aggregate offering amount of our common stock, preferred\\nstock,
      debt securities, warrants, and units. We refer to our common\\nstock, preferred
      stock, debt securities, warrants, and units collectively\\nas the \\\"securities.\\\"
      This prospectus describes some of the general terms\\nthat may apply to these
      securities and the general manner in which they\\nmay be offered. The specific
      terms of any securities to be offered, and\\nthe specific manner in which they
      may be offered, will be described in\\none or more supplements to this prospectus.\\n\\nUSE
      OF PROCEEDS\\n\\nUnless we specify otherwise in the applicable prospectus supplement,
      we\\nintend to use the net proceeds from the sale of the securities for\\ngeneral
      corporate purposes, including working capital, research and\\ndevelopment activities,
      capital expenditures, and to fund the Phase II\\nclinical trial of our lead
      therapeutic candidate ACM-101 in patients\\nwith relapsed multiple myeloma.\\n\\nPLAN
      OF DISTRIBUTION\\n\\nWe may offer the securities directly, through agents, or
      through\\nunderwriters or dealers, including in at-the-market offerings as defined\\nin
      Rule 415(a)(4) under the Securities Act, on the Nasdaq Global Select\\nMarket
      or other exchanges. Any underwriters, dealers, or agents will be\\nidentified,
      and any compensation they receive will be described, in the\\napplicable prospectus
      supplement.\\n\\nThe securities may be sold for cash or other consideration.
      The\\nsecurities may be sold at fixed prices, at market prices prevailing at\\nthe
      time of sale, at prices related to such prevailing market prices, or\\nat negotiated
      prices.\\n\\nDILUTION\\n\\nThe sale of the securities offered hereby will result
      in dilution of the\\nownership interest of our existing stockholders. To the
      extent that we\\nissue and sell additional shares of common stock or securities\\nconvertible
      into or exercisable for shares of common stock, including\\nthrough registered
      direct offerings or at-the-market offerings, our\\nexisting stockholders may
      experience substantial dilution. The exact\\namount of dilution will depend
      on the number of shares sold and the\\nprice at which they are sold.\\n\\nRISK
      FACTORS\\n\\nInvesting in our securities involves a high degree of risk. You
      should\\ncarefully consider the risks and uncertainties described under the\\nheading
      \\\"Risk Factors\\\" contained in our most recent Annual Report on\\nForm 10-K,
      as updated by our subsequent Quarterly Reports on Form 10-Q,\\nwhich are incorporated
      by reference herein.\\n\"}],\"model\":\"claude-haiku-4-5\",\"system\":[{\"type\":\"text\",\"text\":\"You
      are extracting structured dilution and capital-raise signals from an SEC\\nS-1
      or S-3 registration statement. The filing text will be supplied in the\\nnext
      user message.\\n\\nReturn a single JSON object matching the SFilingOutput schema.
      Every claim\\nMUST include:\\n- source_quote: a verbatim substring of the filing
      text that supports the\\n  claim. Preserve the original whitespace exactly \u2014
      do NOT collapse runs of\\n  whitespace or rewrite punctuation. The substring
      will be located in the\\n  filing by whitespace-flexible match; if no occurrence
      is found, OR if more\\n  than one occurrence is found, the claim will be rejected
      and the entire\\n  output quarantined. Choose quotes long and specific enough
      to be unique\\n  in the filing.\\n\\nDO NOT include `source_span`. Character
      offsets are computed in code from\\nyour `source_quote` \u2014 counting characters
      is the worker's job, not yours.\\n\\nFields to populate:\\n- cik: the issuer's
      CIK (10-digit, leading zeros).\\n- accession_number: the filing's SEC accession
      number.\\n- form_type: \\\"S-1\\\" or \\\"S-3\\\".\\n- dilution_event: a single
      Claim describing the headline dilution event\\n  (e.g., \\\"shelf takedown of
      $200M common stock\\\"), with confidence in [0, 1].\\n- capital_raise_language:
      list of Claims for each distinct capital-raise\\n  phrase in the filing (e.g.,
      \\\"at-the-market offering\\\", \\\"registered direct\\\").\\n- use_of_proceeds:
      list of Claims describing intended uses (e.g.,\\n  \\\"general corporate purposes\\\",
      \\\"fund Phase II clinical trial\\\").\\n\\nA Claim is an object with EXACTLY
      two fields: `citation` (an object with\\n`source_quote`) and `confidence` (a
      float in [0, 1]). No other fields are\\nallowed inside a Claim or Citation.
      Example of the required shape for a\\nsingle Claim:\\n\\n  {\\n    \\\"citation\\\":
      {\\n      \\\"source_quote\\\": \\\"shelf takedown of $200 million of common
      stock\\\"\\n    },\\n    \\\"confidence\\\": 0.9\\n  }\\n\\nDo not invent quotes.
      If a field has no support in the filing, return an\\nempty list rather than
      fabricating a citation.\\n\\nReturn ONLY the JSON object. Do not wrap it in
