# Per-ticker transcript-source configuration.
#
# Single source of truth for which transcript source to use per ticker,
# plus per-source override fields. Edited as data (the coverage-survey
# worker rewrites this file); Python modules under
# `src/auto_research/ingest/transcripts/` read it at import time.
#
# Schema per row:
#   source: one of KNOWN_SOURCES in registry.py ("direct_mp3", "youtube").
#   query:  (youtube only) query string substituted for the ticker
#           symbol when searching. Use when bare-ticker search misses
#           (company name is what aggregators use in titles) or when
#           the ticker is a substring of common English words (e.g.,
#           ON in "Conference", BE in "Adobe").
#   url:    (direct_mp3 only) per-quarter URL template with {year}
#           and {quarter} placeholders.
#
# Curation: ticker→company mapping cross-checked against SEC's
# canonical company_tickers.json. Each entry verified by inspecting
# matched URL's actual title. See
# docs/decisions/2026-05-23-transcripts-source.md.

